<div class="top-bar"><a href="naval-index.html">← 总览</a><span>|</span><span style="color:#999;font-size:0.75rem">纳瓦尔的40则人生建议</span><span class="sec-title">六 · 思维方式</span></div>
<div class="hero-sm"><h1>思维<em>方式</em></h1><div class="sub">塑造高质量思考的底层框架 · 5 条建议</div></div>
<main id="root"></main>
<footer>纳瓦尔的40则人生建议 · 深度拓展</footer>
<script>
const C='#4A8C8C',data=[
[36,'长期主义几乎总是赢','长期主义几乎总是赢。','大多数人追求短期结果，而长期策略更容易取得巨大成果。','<p><span class="tag">数学基础</span> 在幂律分布的世界中，极少数事件贡献绝大部分结果。短期主义捕获大量小机会（每个预期值低），长期主义抓住少量大机会（每个预期值高）。</p><p><span class="tag">时间偏好的经济学</span> 高贴现率（极度重视现在）的决策者长期回报系统性地低于低贴现率者（Frederick, Loewenstein &amp; O\'Donoghue, 2002）。</p><p><span class="tag">竞争维度转移</span> 长期主义的优势往往在于<strong>竞争对手的自我淘汰</strong>——大多数人因短期压力放弃了长期策略，长期主义者通过"坚持"本身获得了竞争优势。</p>'],
[37,'真理不依赖共识','真理不依赖共识。','正确的事情往往一开始只有少数人相信。','<p><strong>科学革命的结构</strong>（库恩, 1962）：科学进步经过"常规科学→危机→革命"。每一次革命开始时，新范式都是<strong>少数派甚至一个人的观点</strong>。</p><p><span class="tag">哥白尼的案例</span> 日心说在 1543 年提出时无任何观测证据支持（望远镜 70 年后才发明），完全与当时共识相悖——但它是真理。</p><p><span class="tag">贝叶斯认知论</span> 科学真理 = 根据证据更新信念，而非根据共识调整观点。共识本身不提供信息增量。</p>'],
[38,'用简单原则理解复杂世界','用简单原则理解复杂世界。','底层规律往往很简单，只是表面看起来复杂。','<p><strong>奥卡姆剃刀</strong>——"如无必要，勿增实体"。在具有相同解释力的假设中，最简单的通常最优。模型越复杂、参数越多，越容易过拟合。</p><p><span class="tag">心智模型</span> 芒格强调约 100 个跨学科心智模型足以理解世界大部分现象：复利、供需、临界质量、激励、帕累托原则等。</p><p><span class="tag">涌现</span> Wolfram（2002）展示简单规则通过重复迭代产生极其复杂的模式。理解底层规则 → 理解上层涌现的现象。</p>'],
[39,'不要被社会默认路径束缚','不要被社会默认路径束缚。','传统成功路径（上学—工作—退休）并不是唯一选择。','<p><strong>社会时钟</strong>（Neugarten, 1965）——每个社会有隐性的人生时间表。违反社会时钟的人感受<strong>社会制裁</strong>，即使违反在理性上最优。</p><p><span class="tag">从众的机会成本</span> 遵循默认路径的最大代价不是"做得不好"的显性成本，而是<strong>不做其他事</strong>的机会成本：创业、转行、周游世界。</p><p><span class="tag">百岁人生</span> 随着寿命延长，"三段式人生"正在被"多段式人生"取代（Gratton &amp; Scott, 2016）。固守旧默认路径的人面临更大的适应性危机。</p>'],
[40,'学会独立思考','学会独立思考。','只有独立判断，才能发现真正的机会。','<p><span class="tag">可训练性</span> 批判性思维可通过系统训练显著提高（meta 分析显示约 0.5-0.7 标准差效果，Abrami et al., 2008）。</p><p><span class="tag">知识诅咒</span> 独立思考需要在<strong>接收到外部观点之前</strong>形成自己的初步判断。在讨论前阅读材料并写下自己的观点，是有效的独立思考练习。</p><p><span class="tag">群体思维</span> Janis（1972）归纳八大症状：无懈可击的幻觉、集体合理化、从众压力、自我审查等。2-3 个即严重损害独立思考。</p><p><span class="tag">最终矛盾</span> 真正的独立思考者知道自己能力<strong>有限</strong>——在独立和接受外部信息之间寻找动态平衡。盲目的逆反不是独立思考，而是反向的从众。</p>']
];
const root=document.getElementById('root');
root.innerHTML=`<div class="section-header"><div class="section-svg"><svg viewBox="0 0 120 120"><g stroke="${C}" stroke-width="0.8" opacity="0.3"><line x1="60" y1="20" x2="30" y2="50"/><line x1="60" y1="20" x2="90" y2="50"/><line x1="30" y1="50" x2="20" y2="85"/><line x1="30" y1="50" x2="60" y2="60"/><line x1="90" y1="50" x2="100" y2="85"/><line x1="90" y1="50" x2="60" y2="60"/><line x1="60" y1="60" x2="40" y2="90"/><line x1="60" y1="60" x2="80" y2="90"/></g><g fill="${C}"><circle cx="60" cy="20" r="4" opacity="0.65"/><circle cx="30" cy="50" r="3" opacity="0.45"/><circle cx="90" cy="50" r="3" opacity="0.45"/><circle cx="60" cy="60" r="3.5" opacity="0.55"/><circle cx="20" cy="85" r="2.5" opacity="0.35"/><circle cx="100" cy="85" r="2.5" opacity="0.35"/></g></svg></div><div class="section-info"><div class="num">六 · 6/6</div><h2>思维方式</h2><div class="desc">塑造高质量思考的底层框架</div></div></div>`+
data.map(d=>`<div class="principle"><div class="idx">#${d[0]} / 40</div><div class="title">${d[1]}</div><div class="orig-box"><div class="lbl">原文</div><div class="q">${d[2]}</div><div class="e">${d[3]}</div></div><div class="body">${d[4]}</div></div>`).join('')+
`<div class="sec-end"><span></span><span></span><span></span></div>`;
const obs=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible')})},{threshold:0.08});
document.querySelectorAll('.principle').forEach(el=>obs.observe(el));
</script></body></html>
