<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>纳瓦尔的40则人生建议 · 深度拓展</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;600;700;900&family=LXGW+WenKai:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Noto Serif SC', serif;
  background: #f9f7f4;
  color: #2c2c2c;
  line-height: 1.9;
  -webkit-font-smoothing: antialiased;
}
:root {
  --c1: #C49B3C; --c2: #5B8C5A; --c3: #4A6FA5;
  --c4: #C97B84; --c5: #8B7EAC; --c6: #4A8C8C;
}

/* ── Hero ── */
.hero {
  min-height: 100vh; display: flex; flex-direction: column;
  justify-content: center; align-items: center; text-align: center;
  padding: 2rem; position: relative; overflow: hidden;
  background: linear-gradient(165deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
}
.hero-bg-svg {
  position: absolute; inset: 0; width: 100%; height: 100%; z-index: 0;
  opacity: 0.15; pointer-events: none;
}
.hero-content { position: relative; z-index: 1; max-width: 700px; }
.hero-badge {
  display: inline-block; font-family: 'Inter', sans-serif;
  font-size: 0.75rem; font-weight: 600; letter-spacing: 0.15em;
  text-transform: uppercase; color: rgba(255,255,255,0.4);
  border: 1px solid rgba(255,255,255,0.1); padding: 0.4rem 1.2rem;
  border-radius: 100px; margin-bottom: 2rem;
}
.hero h1 {
  font-size: clamp(2.4rem, 6vw, 4.2rem); font-weight: 900;
  color: #fff; line-height: 1.25; letter-spacing: 0.02em;
}
.hero h1 em {
  font-style: normal;
  background: linear-gradient(135deg, #C49B3C, #D4A853);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.hero-sub {
  font-size: 1.1rem; color: rgba(255,255,255,0.55); margin-top: 1.2rem;
  font-family: 'Inter', sans-serif; font-weight: 300; letter-spacing: 0.08em;
}
.hero-scroll {
  position: absolute; bottom: 2.5rem; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,0.25); font-size: 0.8rem; font-family: 'Inter', sans-serif;
  letter-spacing: 0.1em; animation: bounce 2s infinite;
}
@keyframes bounce { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(8px)} }

/* ── Floating Nav ── */
.floating-nav {
  position: fixed; top: 1.5rem; left: 50%; transform: translateX(-50%);
  z-index: 100; display: flex; gap: 0.25rem;
  background: rgba(255,255,255,0.85); backdrop-filter: blur(20px) saturate(1.4);
  border: 1px solid rgba(0,0,0,0.06); border-radius: 100px; padding: 0.4rem;
  box-shadow: 0 4px 30px rgba(0,0,0,0.06); transition: opacity 0.4s, transform 0.4s;
}
.floating-nav.hidden { opacity: 0; transform: translateX(-50%) translateY(-20px); pointer-events: none; }
.floating-nav a {
  text-decoration: none; font-family: 'Inter', sans-serif; font-size: 0.7rem; font-weight: 500;
  color: #666; padding: 0.4rem 0.9rem; border-radius: 100px; transition: all 0.25s; white-space: nowrap;
}
.floating-nav a:hover { background: rgba(0,0,0,0.04); color: #222; }
.floating-nav a.active { background: #1a1a2e; color: #fff; }

/* ── Main ── */
main { max-width: 920px; margin: 0 auto; padding: 4rem 1.5rem 6rem; }

/* ── Section ── */
.section { margin-bottom: 6rem; position: relative; }
.section:last-child { margin-bottom: 0; }

/* ── Section Header with SVG ── */
.section-header-wrap {
  display: flex; align-items: center; gap: 2.5rem;
  margin-bottom: 3rem; padding: 1.5rem 0; position: relative;
}
.section-header-wrap::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0;
  height: 1px; background: linear-gradient(90deg, var(--sec), transparent);
}
.section-svg { flex-shrink: 0; width: 120px; height: 120px; }
.section-svg svg { width: 100%; height: 100%; }
.section-header { flex: 1; }
.section-header .section-number {
  font-family: 'Inter', sans-serif; font-size: 0.7rem; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase; color: var(--sec); opacity: 0.5;
}
.section-header h2 {
  font-size: clamp(1.6rem, 3vw, 2.2rem); font-weight: 700; color: var(--sec);
  letter-spacing: 0.03em; margin-top: 0.1rem;
}
.section-header .section-desc {
  font-size: 0.9rem; color: #999; margin-top: 0.3rem; font-family: 'Inter', sans-serif; font-weight: 300;
}

/* ── Principle Card ── */
.principle {
  margin-bottom: 2.5rem; padding: 2rem 2.2rem;
  background: #fff; border-radius: 18px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.03), 0 4px 24px rgba(0,0,0,0.04);
  transition: all 0.3s; position: relative;
  opacity: 0; transform: translateY(20px);
}
.principle.visible { opacity: 1; transform: translateY(0); }
.principle:hover {
  box-shadow: 0 2px 8px rgba(0,0,0,0.04), 0 12px 48px rgba(0,0,0,0.06);
  transform: translateY(-2px);
}
.principle.visible:hover { transform: translateY(-2px); }
.principle-index {
  display: flex; align-items: center; gap: 0.5rem;
  font-family: 'Inter', sans-serif; font-size: 0.7rem; font-weight: 600;
  color: var(--sec); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.7rem;
}
.principle-index svg { width: 16px; height: 16px; opacity: 0.6; }
.principle-title {
  font-size: 1.15rem; font-weight: 700; color: #1a1a2e;
  line-height: 1.5; margin-bottom: 1rem; padding-left: 0;
}

/* ── Original Quote Box ── */
.original-box {
  border-left: 3px solid var(--sec);
  padding: 0.8rem 1.2rem; border-radius: 0 10px 10px 0;
  margin-bottom: 1.2rem; font-size: 0.92rem; line-height: 1.7;
  background: rgba(0,0,0,0.015);
}
.original-box .orig-label {
  font-family: 'Inter', sans-serif; font-size: 0.6rem; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase; color: var(--sec); margin-bottom: 0.2rem;
}
.original-box .orig-quote { font-weight: 600; color: #1a1a2e; }
.original-box .orig-explain { color: #888; margin-top: 0.15rem; font-weight: 400; font-size: 0.88rem; }

/* ── Body ── */
.body-content { font-size: 0.93rem; line-height: 1.85; color: #3a3a3a; }
.body-content strong { color: #1a1a2e; font-weight: 700; }
.body-content em { font-style: italic; color: #999; }
.body-content .label {
  display: inline-block; font-family: 'Inter', sans-serif; font-size: 0.72rem; font-weight: 600;
  color: var(--sec); border: 1px solid var(--sec); border-radius: 4px;
  padding: 0.02rem 0.55rem; margin-right: 0.3rem; opacity: 0.7; white-space: nowrap;
}
.body-content ul { list-style: none; padding: 0.4rem 0 0.2rem 0.5rem; }
.body-content ul li { position: relative; padding-left: 1.2rem; margin-bottom: 0.4rem; }
.body-content ul li::before {
  content: ''; position: absolute; left: 0; top: 0.75em;
  width: 5px; height: 5px; border-radius: 50%; background: var(--sec); opacity: 0.4;
}
.body-content p { margin-bottom: 0.55rem; }
.body-content table {
  width: 100%; border-collapse: collapse; margin: 0.8rem 0; font-size: 0.82rem; font-family: 'Inter', sans-serif;
}
.body-content th, .body-content td {
  padding: 0.5rem 0.7rem; text-align: left; border-bottom: 1px solid rgba(0,0,0,0.06);
}
.body-content th { font-weight: 600; color: var(--sec); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; }
.body-content tr:last-child td { border-bottom: none; }
.body-content code { font-family: 'Inter', monospace; font-size: 0.82em; background: rgba(0,0,0,0.04); padding: 0.1em 0.4em; border-radius: 4px; color: #555; }

/* ── Section End Ornament ── */
.section-end { display: flex; justify-content: center; padding: 1.5rem 0 0; gap: 0.6rem; }
.section-end span {
  width: 5px; height: 5px; border-radius: 50%; background: var(--sec); opacity: 0.2;
  animation: pulse 2s ease-in-out infinite;
}
.section-end span:nth-child(2) { animation-delay: 0.4s; }
.section-end span:nth-child(3) { animation-delay: 0.8s; }
@keyframes pulse { 0%,100%{opacity:0.2} 50%{opacity:0.6} }

/* ── Focus Quote (穿插在正文间的重点引述) ── */
.focus-quote {
  font-family: 'LXGW WenKai', serif; font-size: 1.05rem; color: var(--sec);
  padding: 1rem 1.5rem; margin: 1rem 0; border-radius: 12px;
  background: linear-gradient(135deg, rgba(0,0,0,0.01), rgba(0,0,0,0.02));
  text-align: center; line-height: 1.6; font-weight: 400;
}

/* ── Data Viz (嵌入式迷你图表) ── */
.data-viz { text-align: center; margin: 1.2rem 0; }

/* ── Footer ── */
footer {
  text-align: center; padding: 3rem 1.5rem 5rem;
  font-family: 'Inter', sans-serif; font-size: 0.78rem; color: #bbb;
}

/* ── Back to Top ── */
.back-top {
  position: fixed; bottom: 2rem; right: 2rem;
  width: 44px; height: 44px; border-radius: 50%;
  background: #1a1a2e; color: #fff; border: none; cursor: pointer;
  font-size: 1.2rem; box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  transition: all 0.3s; opacity: 0; pointer-events: none; z-index: 50;
}
.back-top.visible { opacity: 1; pointer-events: auto; }
.back-top:hover { transform: translateY(-3px); box-shadow: 0 6px 24px rgba(0,0,0,0.18); }

@media (max-width: 640px) {
  .floating-nav { top: auto; bottom: 0; left: 0; right: 0; transform: none; border-radius: 0; border: none; border-top:1px solid rgba(0,0,0,0.06); padding: 0.6rem 0.4rem; overflow-x: auto; justify-content: center; }
  .floating-nav a { font-size: 0.6rem; padding: 0.3rem 0.6rem; }
  .principle { padding: 1.5rem 1.2rem; }
  main { padding: 2rem 1rem 5rem; }
  .back-top { bottom: 5rem; right: 1rem; }
  .section-header-wrap { flex-direction: column; gap: 1rem; }
  .section-svg { width: 80px; height: 80px; }
}
</style>
</head>

        quote:'财富不是钱，而是能在你不工作时仍然赚钱的资产。',
        explain:'真正的财富是股票、公司股权、知识产权、软件等可以持续产生价值的东西，而不是一次性的工资收入。',
        body:`<p>纳瓦尔对"财富"的定义与传统经济学中的"资本存量"概念高度吻合。经济学家欧文·费雪（Irving Fisher, 1930）在《利息理论》中提出：<strong>收入是一连串的事件，而资本是未来收入的折现</strong>。钱本身只是交换媒介，真正的财富是能持续产生现金流的资产。</p>
<p>从<strong>会计学</strong>角度看，这区分了"资产负债表"和"利润表"——工资收入在利润表（一次性流入），而资产在资产负债表（持续产出）。从<strong>个人财务</strong>角度，这指向了"财务独立"（FI）运动的核心：当你的被动收入 ≥ 日常支出，你就实现了财务自由。FI 运动的数学基础是 <strong>4% 法则</strong>（Trinity Study, 1998）：持有 25 倍年支出的资产组合，历史上可持续提取 30 年。</p>
<p><span class="label">神经科学</span> 多巴胺系统对"一次性奖励"反应强烈但短暂，而对"持续稳定收入流"的预期激活前额叶皮层的长期规划回路（McClure et al., 2004, <em>Science</em>），形成更稳定的心理安全感。</p>
<p><span class="label">更深层</span> 这是在倡导从"时间换钱"的线性模式切换到"系统换钱"的指数模式。经济学家称此为"从劳动收入向资本收入的转变"（Piketty, 2014, <em>21世纪资本论</em>）。</p>`

        explain:'打工本质是时间换钱，而股权意味着你拥有企业的一部分，可以享受长期增长带来的回报。',
        body:`<p>这背后的数学基础是<strong>收益的分布形态</strong>：出售时间的收入呈近似正态分布，而股权收益呈<strong>幂律分布</strong>（Power Law）——少数公司创造绝大部分回报。Venture Capital 的收益分布遵循 1% 的项目占据 90%+ 回报的规律（Kauffman Foundation, 2014）。</p>
<p>从<strong>生产要素理论</strong>看，Piketty 的公式 <code>r &gt; g</code> 意味着拥有资本的人天然获得更大的财富份额。OECD 数据显示，劳动收入占 GDP 的比重从 1970 年代的约 65% 下降到 2020 年代的约 55%。</p>
<p><span class="label">行为经济学</span> 出售时间有明确上限（一天 24 小时），而股权价值没有天然上限——这就是"规模效应"。</p>
<p><span class="label">进化心理学</span> 人类大脑偏好"即时确定性回报"，对"未来不确定的大回报"本能回避。这解释了为什么大多数人选择打工而非创业。</p>`

        body:`<p>这是<strong>杠杆（Leverage）</strong>理论的现代版本。纳瓦尔区分了三类杠杆：劳动力杠杆（雇人）、资本杠杆（用钱生钱）、代码和媒体杠杆（软件+内容）——最后一类<strong>无需许可</strong>（Permissionless），成本接近零。</p>
<p>从<strong>信息经济学</strong>的视角，数字产品的<strong>边际成本趋近于零</strong>（Shapiro &amp; Varian, 1998）。GitHub 上一个开源项目、一篇公众号文章，服务第 1000 万个用户的成本几乎为零。</p>

        body:`<p><strong>复利</strong>被爱因斯坦称为"世界第八大奇迹"。其数学本质是 <code>A = P(1+r)^t</code>——关键在于时间 <code>t</code> 和持续的正回报率 <code>r</code>。</p>

        body:`<p><strong>自我决定理论</strong>（Deci &amp; Ryan, 1985）指出，人类有三种基本心理需求：自主性、胜任感和关联性。好奇心驱动的学习满足了自主性和胜任感，是最强的内在动机来源。</p>

<p><span class="label">享乐适应</span> 年收入约 $75,000 后，收入增长不再显著提升日常情绪幸福感（Kahneman &amp; Deaton, 2010）。但为高薪选择不喜欢的高压行业带来的痛苦没有这种适应机制。</p>

        body:`<p><strong>神经可塑性（Neuroplasticity）</strong>从根本上支持了这一论断。大脑根据经验持续重组——冥想、感恩练习、认知行为训练都能在结构上改变大脑。</p>
<p><span class="label">遗传率 vs 可训练性</span> 双生子研究（Lykken &amp; Tellegen, 1996）显示幸福感遗传率约 40-50%，剩下 50-60% 由环境和自主行为决定。通过训练可将幸福感保持在更高区间。</p>
<p><span class="label">积极心理学干预</span> Seligman 等（2005）RCT 证明：每天记录三件好事（6 月后效果仍显著）、感恩拜访（幸福感提升持续 3 月+）、运用标志性优势——均能显著提升幸福感。</p>`

<p><span class="label">欲望 vs 满足的神经科学</span> Kent Berridge 区分了"想要"（多巴胺驱动，无限增长）和"喜欢"（阿片系统驱动，有天然上限）。满足一个欲望不会减少下一个欲望的强度。</p>
<p><span class="label">减法幸福</span> 解决方式不是"满足所有欲望"（不可能），而是<strong>管理欲望</strong>——主动选择你在意什么，而非被进化程序驱使。</p>`

// ── Render ──
const main = document.getElementById('mainContent');
sections.forEach((sec, si) => {
  const section = document.createElement('section');
  section.className = `section`;
  section.id = sec.id;
  section.style.setProperty('--sec', `var(--c${sec.si})`);

  // Header with SVG
  const wrap = document.createElement('div');
  wrap.className = 'section-header-wrap';
  wrap.innerHTML = `
    <div class="section-svg">${sectionSvgs[sec.si]}</div>
    <div class="section-header">
      <div class="section-number">${sec.num} · ${si+1}/${sections.length}</div>
      <h2>${sec.title}</h2>
      <div class="section-desc">${sec.desc}</div>
    </div>
  `;
  section.appendChild(wrap);

  // Principles
  sec.principles.forEach((p, pi) => {
    const card = document.createElement('div');
    card.className = 'principle';
    card.innerHTML = `
      <div class="principle-index">${principleIcons[p.icon] || ''} #${p.idx} / 40</div>
      <div class="principle-title">${p.title}</div>
      <div class="original-box">
        <div class="orig-label">原文</div>
        <div class="orig-quote">${p.quote}</div>
        <div class="orig-explain">${p.explain}</div>
      </div>
      <div class="body-content">${p.body}</div>
    `;
    section.appendChild(card);
    if (pi < sec.principles.length - 1) {
      const d = document.createElement('div');
      d.style.cssText = 'height:1px;background:linear-gradient(90deg,transparent,rgba(0,0,0,0.04),transparent);margin:0 0 2.5rem';
      section.appendChild(d);
    }
  });

  // End ornament
  const end = document.createElement('div');
  end.className = 'section-end';
  end.innerHTML = '<span></span><span></span><span></span>';
  section.appendChild(end);
  main.appendChild(section);
});

// ── Intersection Observer ──
const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.08 });
document.querySelectorAll('.principle').forEach(el => observer.observe(el));

// ── Floating Nav ──
const nav = document.getElementById('floatingNav');
const navLinks = nav.querySelectorAll('a');
const heroObs = new IntersectionObserver(([e]) => {
  nav.classList.toggle('hidden', e.isIntersecting);
}, { threshold: 0 });
heroObs.observe(document.querySelector('.hero'));

// ── Scroll-based nav active (more reliable than IntersectionObserver for sticky nav) ──
function updateActiveNav() {
  const scrollY = window.scrollY + 120;
  let activeId = 's1';
  document.querySelectorAll('.section').forEach(el => {
    const top = el.offsetTop;
    const bottom = top + el.offsetHeight;
    if (scrollY >= top && scrollY < bottom) activeId = el.id;
  });
  navLinks.forEach(a => a.classList.toggle('active', a.getAttribute('href') === `#${activeId}`));
}
window.addEventListener('scroll', updateActiveNav, { passive: true });
window.addEventListener('resize', updateActiveNav);
// run once on load too
setTimeout(updateActiveNav, 100);

// ── Back to Top ──
const backTop = document.getElementById('backTop');
window.addEventListener('scroll', () => { backTop.classList.toggle('visible', window.scrollY > 600); });
</script>
