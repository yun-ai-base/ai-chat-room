<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telegram 群组/频道/机器人 合集</title>
<style>
  :root {
    --primary: #2563eb;
    --primary-light: #3b82f6;
    --primary-dark: #1d4ed8;
    --secondary: #0d9488;
    --accent: #f59e0b;
    --bg: #f0f5ff;
    --card-bg: #ffffff;
    --text: #1e293b;
    --text-muted: #64748b;
    --border: #e2e8f0;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-lg: 0 10px 25px rgba(0,0,0,0.08);
    --radius: 16px;
    --sidebar-w: 280px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Layout */
  .app { display: flex; min-height: 100vh; }

  /* Sidebar */
  .sidebar {
    width: var(--sidebar-w);
    background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
    color: #fff;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    overflow-y: auto;
    z-index: 100;
    transition: transform 0.3s ease;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
  .sidebar-header {
    padding: 28px 20px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .sidebar-header h1 {
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.5px;
  }
  .sidebar-header p {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    margin-top: 4px;
  }
  .sidebar-nav { padding: 12px 0; }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    cursor: pointer;
    font-size: 13px;
    color: rgba(255,255,255,0.7);
    transition: all 0.2s;
    border-left: 3px solid transparent;
  }
  .nav-item:hover {
    color: #fff;
    background: rgba(255,255,255,0.05);
  }
  .nav-item.active {
    color: #fff;
    background: rgba(59,130,246,0.15);
    border-left-color: var(--primary-light);
  }
  .nav-item .badge {
    margin-left: auto;
    font-size: 11px;
    background: rgba(255,255,255,0.1);
    padding: 1px 8px;
    border-radius: 10px;
    color: rgba(255,255,255,0.5);
  }
  .nav-item.active .badge { background: rgba(59,130,246,0.3); color: #93c5fd; }

  /* Main Content */
  .main {
    margin-left: var(--sidebar-w);
    flex: 1;
    padding: 0;
    min-height: 100vh;
  }

  /* Hero */
  .hero {
    background: linear-gradient(135deg, #2563eb 0%, #0d9488 50%, #2563eb 100%);
    padding: 48px 40px 40px;
    color: #fff;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -50%; right: -20%;
    width: 500px; height: 500px;
    background: rgba(255,255,255,0.05);
    border-radius: 50%;
    pointer-events: none;
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: -30%; left: -10%;
    width: 300px; height: 300px;
    background: rgba(255,255,255,0.03);
    border-radius: 50%;
    pointer-events: none;
  }
  .hero h2 {
    font-size: 28px;
    font-weight: 800;
    position: relative;
    z-index: 1;
  }
  .hero p {
    font-size: 14px;
    opacity: 0.85;
    margin-top: 8px;
    position: relative;
    z-index: 1;
  }
  .hero-stats {
    display: flex;
    gap: 32px;
    margin-top: 24px;
    position: relative;
    z-index: 1;
  }
  .hero-stat {
    text-align: center;
  }
  .hero-stat .num {
    font-size: 28px;
    font-weight: 800;
  }
  .hero-stat .label {
    font-size: 12px;
    opacity: 0.7;
  }

  /* Search */
  .search-bar {
    position: relative;
    margin-top: 24px;
    max-width: 600px;
    z-index: 1;
  }
  .search-bar input {
    width: 100%;
    padding: 14px 20px 14px 48px;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    color: #fff;
    outline: none;
    transition: all 0.3s;
    font-family: inherit;
  }
  .search-bar input::placeholder { color: rgba(255,255,255,0.6); }
  .search-bar input:focus { background: rgba(255,255,255,0.25); }
  .search-bar .icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.7;
    font-size: 18px;
  }

  /* Content Area */
  .content { padding: 28px 40px; }

  .section-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-title .count {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    background: var(--border);
    padding: 2px 12px;
    border-radius: 20px;
  }

  /* Cards Grid */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    transition: all 0.25s ease;
    display: flex;
    flex-direction: column;
  }
  .card:hover {
    box-shadow: var(--shadow-lg);
    transform: translateY(-2px);
    border-color: var(--primary-light);
  }
  .card-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-links {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }
  .card-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 12px;
    background: #eef2ff;
    color: var(--primary);
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    text-decoration: none;
    transition: all 0.2s;
    white-space: nowrap;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-link:hover {
    background: var(--primary);
    color: #fff;
  }
  .card-link .tg-icon {
    width: 14px; height: 14px;
  }
  .card-desc {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
    margin-top: auto;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }

  /* Back to top */
  .back-top {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--primary);
    color: #fff;
    border: none;
    font-size: 20px;
    cursor: pointer;
    box-shadow: var(--shadow-lg);
    transition: all 0.3s;
    opacity: 0;
    pointer-events: none;
    z-index: 99;
  }
  .back-top.visible {
    opacity: 1;
    pointer-events: auto;
  }
  .back-top:hover {
    transform: scale(1.1);
    background: var(--primary-dark);
  }

  /* Scrollbar */
  .main::-webkit-scrollbar { width: 6px; }
  .main::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

  /* Responsive */
  @media (max-width: 768px) {
    .sidebar {
      transform: translateX(-100%);
      width: 260px;
    }
    .sidebar.open { transform: translateX(0); }
    .main { margin-left: 0; }
    .hero { padding: 32px 20px; }
    .content { padding: 20px; }
    .card-grid { grid-template-columns: 1fr; }
    .hero h2 { font-size: 22px; }
    .mobile-toggle {
      display: flex !important;
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 200;
      width: 40px; height: 40px;
      border-radius: 10px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      align-items: center;
      justify-content: center;
    }
  }
  .mobile-toggle { display: none; }

  /* Overlay */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 99;
  }
  .overlay.show { display: block; }

  @media (max-width: 768px) {
    .hero-stats { gap: 16px; }
    .hero-stat .num { font-size: 20px; }
  }
</style>
</head>

// Render
const sidebarNav = document.getElementById('sidebarNav');
const content = document.getElementById('content');
const searchInput = document.getElementById('searchInput');
const emptyState = document.getElementById('emptyState');
const totalEntriesEl = document.getElementById('totalEntries');
const totalSectionsEl = document.getElementById('totalSections');
const totalLinksEl = document.getElementById('totalLinks');
const backTop = document.getElementById('backTop');
const menuToggle = document.getElementById('menuToggle');
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');

let activeIdx = 0;
let filteredData = null;

// Stats
let totalEntries = 0, totalLinks = 0;
DATA.forEach(s => {
  if (s.type === 'table') {
    totalEntries += s.data.length;
    s.data.forEach(row => {
      Object.values(row).forEach(cell => {
        if (cell.links) totalLinks += cell.links.length;
      });
    });
  }
});
totalEntriesEl.textContent = totalEntries;
totalSectionsEl.textContent = DATA.length;
totalLinksEl.textContent = totalLinks;

// Build nav
DATA.forEach((s, i) => {
  if (s.type !== 'table') return;
  const label = s.heading.replace(/^#+\s*/, '');
  const div = document.createElement('div');
  div.className = 'nav-item' + (i === 0 ? ' active' : '');
  div.textContent = label;
  const badge = document.createElement('span');
  badge.className = 'badge';
  badge.textContent = s.data.length;
  div.appendChild(badge);
  div.dataset.idx = i;
  div.addEventListener('click', () => selectSection(i));
  sidebarNav.appendChild(div);
});

function selectSection(idx) {
  activeIdx = idx;
  document.querySelectorAll('.nav-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  renderSection(idx);
  // Close mobile sidebar
  sidebar.classList.remove('open');
  overlay.classList.remove('show');
}

function renderSection(idx) {
  const section = DATA[idx];
  if (!section || section.type !== 'table') return;

  const label = section.heading.replace(/^#+\s*/, '');

  let html = `<div class="section-title">${label} <span class="count">${section.data.length} 项</span></div>`;
  html += '<div class="card-grid">';

  section.data.forEach(row => {
    const keys = Object.keys(row);
    const nameKey = keys[0];
    const linkKey = keys.length > 1 ? keys[1] : '';
    const descKey = keys.length > 2 ? keys[2] : '';

    const name = row[nameKey]?.text || '';
    const desc = row[descKey]?.text || '';
    const links = [];

    Object.values(row).forEach(cell => {
      if (cell.links) {
        cell.links.forEach(l => {
          if (l.url && !links.find(x => x.url === l.url)) {
            links.push(l);
          }
        });
      }
    });

    // Extract emoji from name
    const emojis = name.match(/[\u{1F000}-\u{1FFFF}]|[☀-➿]|[\u{2700}-\u{27BF}]|[⭐💎🚀🎧💪🌈👚🍉📱💰⚡️]/gu) || [];
    const cleanName = name.replace(/[\u{1F000}-\u{1FFFF}]|[☀-➿]|[\u{2700}-\u{27BF}]|[⭐💎🚀🎧💪🌈👚🍉📱💰⚡️]/gu, '').trim();

    html += '<div class="card">';
    html += `<div class="card-name">${emojis.join('')} ${cleanName || name}</div>`;

    if (links.length > 0) {
      html += '<div class="card-links">';
      links.forEach(l => {
        const display = l.text.length > 30 ? l.text.substring(0, 28) + '…' : l.text;
        const isTg = l.url.includes('t.me') || l.url.includes('telegram.me');
        html += `<a href="${l.url}" target="_blank" rel="noopener" class="card-link">${isTg ? '📨' : '🔗'} ${display}</a>`;
      });
      html += '</div>';
    }

    if (desc) {
      const shortDesc = desc.length > 200 ? desc.substring(0, 197) + '…' : desc;
      html += `<div class="card-desc">${shortDesc}</div>`;
    }

    html += '</div>';
  });

  html += '</div>';
  content.innerHTML = html;
  emptyState.style.display = 'none';
}

function renderFiltered() {
  if (!filteredData || filteredData.length === 0) {
    emptyState.style.display = 'block';
    content.innerHTML = '';
    return;
  }

  let html = '';
  filteredData.forEach(item => {
    const label = item.heading.replace(/^#+\s*/, '');
    html += `<div class="section-title">${label} <span class="count">${item.data.length} 项</span></div>`;
    html += '<div class="card-grid">';

    item.data.forEach(row => {
      const keys = Object.keys(row);
      const name = row[keys[0]]?.text || '';
      const desc = keys.length > 2 ? (row[keys[2]]?.text || '') : '';
      const links = [];

      Object.values(row).forEach(cell => {
        if (cell.links) {
          cell.links.forEach(l => {
            if (l.url && !links.find(x => x.url === l.url)) links.push(l);
          });
        }
      });

      const emojis = name.match(/[\u{1F000}-\u{1FFFF}]|[☀-➿]|[\u{2700}-\u{27BF}]|[⭐💎🚀🎧💪🌈👚🍉📱💰⚡️]/gu) || [];
      const cleanName = name.replace(/[\u{1F000}-\u{1FFFF}]|[☀-➿]|[\u{2700}-\u{27BF}]|[⭐💎🚀🎧💪🌈👚🍉📱💰⚡️]/gu, '').trim();

      html += '<div class="card">';
      html += `<div class="card-name">${emojis.join('')} ${cleanName || name}</div>`;

      if (links.length > 0) {
        html += '<div class="card-links">';
        links.forEach(l => {
          const display = l.text.length > 30 ? l.text.substring(0, 28) + '…' : l.text;
          const isTg = l.url.includes('t.me') || l.url.includes('telegram.me');
          html += `<a href="${l.url}" target="_blank" rel="noopener" class="card-link">${isTg ? '📨' : '🔗'} ${display}</a>`;
        });
        html += '</div>';
      }

      if (desc) {
        const shortDesc = desc.length > 200 ? desc.substring(0, 197) + '…' : desc;
        html += `<div class="card-desc">${shortDesc}</div>`;
      }

      html += '</div>';
    });

    html += '</div>';
  });

  content.innerHTML = html;
  emptyState.style.display = 'none';
}

// Search
searchInput.addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  if (!q) {
    filteredData = null;
    selectSection(activeIdx);
    return;
  }

  filteredData = [];
  DATA.forEach(s => {
    if (s.type !== 'table') return;
    const matched = s.data.filter(row => {
      return Object.values(row).some(cell => {
        const text = (cell.text || '').toLowerCase();
        const links = (cell.links || []).map(l => (l.text + ' ' + l.url).toLowerCase()).join(' ');
        return text.includes(q) || links.includes(q);
      });
    });
    if (matched.length > 0) {
      filteredData.push({ ...s, data: matched });
    }
  });

  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  renderFiltered();
});

// Back to top
window.addEventListener('scroll', () => {
  backTop.classList.toggle('visible', window.pageYOffset > 400);
});
backTop.addEventListener('click', () => {
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

// Mobile menu
menuToggle.addEventListener('click', () => {
  sidebar.classList.toggle('open');
  overlay.classList.toggle('show');
});
overlay.addEventListener('click', () => {
  sidebar.classList.remove('open');
  overlay.classList.remove('show');
});

// Init
selectSection(0);
</script>
